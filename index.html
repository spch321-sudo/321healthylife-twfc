<style>
:root{
  --bg:#eef6ec; --surface:#ffffff; --surface2:#f2f8ef;
  --text:#1f2d20; --text2:#5a6b5e; --text3:#5e6c6080;
  --muted:#5a6b5e; --border:#e2ecdf;
  --brand:#2e7d32; --brand-d:#1b5e20; --brand-l:#43a047;
  --hero:linear-gradient(135deg,#1b5e20,#2e7d32 60%,#43a047);
  --shadow:0 2px 12px rgba(27,94,32,.08);
  --track:#e6ede4;
}
html[data-theme="dark"]{
  --bg:#0f1613; --surface:#1a2620; --surface2:#16201a;
  --text:#e9efe9; --text2:#a9bdb0; --text3:#7e9285;
  --muted:#a9bdb0; --border:#2a3a30;
  --brand:#66bb6a; --brand-d:#81c995; --brand-l:#81c995;
  --hero:linear-gradient(135deg,#10301a,#1b4524);
  --shadow:0 2px 12px rgba(0,0,0,.35);
  --track:#2c3c33;
}
html[data-fs="std"]{ font-size:16px; }
html[data-fs="large"]{ font-size:18.5px; }
html[data-fs="xl"]{ font-size:21px; }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans CJK TC",sans-serif;
  line-height:1.55;transition:background .25s,color .25s;}
.wrap{max-width:560px;margin:0 auto;padding:12px 14px calc(140px + env(safe-area-inset-bottom));}
.appbar{background:var(--bg);
  padding:6px 2px 8px;display:flex;align-items:center;gap:8px;}
.appbar .brand{font-size:1.15rem;font-weight:800;color:var(--brand-d);}
.appbar .sec{font-size:.72rem;font-weight:800;letter-spacing:2px;color:var(--brand-l);opacity:.8;}
.card{background:var(--surface);border-radius:16px;padding:1rem;margin:.7rem 0;
  box-shadow:var(--shadow);border:1px solid var(--border);}
h2.title{font-size:1.15rem;font-weight:800;color:var(--brand-d);margin:1.1rem 2px .2rem;}
.lead{font-size:.82rem;color:var(--muted);margin:0 2px .5rem;}

/* hero ring */
.hero{text-align:center;}
.hero .date{color:var(--muted);font-size:.86rem;}
.ring-wrap{position:relative;width:148px;height:148px;margin:.4rem auto .2rem;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-wrap .mid{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;}
.ring-wrap .pct{font-size:2rem;font-weight:800;color:var(--brand-d);line-height:1;}
.ring-wrap .pl{font-size:.78rem;color:var(--muted);margin-top:2px;}
.verse{background:var(--surface2);border-left:4px solid var(--brand-l);border-radius:12px;
  padding:.7rem .85rem;margin-top:.7rem;color:var(--brand-d);font-size:.92rem;font-style:italic;text-align:center;}

/* pillar */
.pillar{display:flex;gap:.7rem;align-items:flex-start;}
.pillar .ic{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:1.5rem;background:var(--surface2);}
.pillar .body{flex:1;min-width:0;}
.pillar .row1{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.pillar .nm{font-size:1.05rem;font-weight:800;}
.pillar .en{font-size:.82rem;color:var(--muted);font-weight:500;margin-left:5px;}
.pillar .goal{font-size:.92rem;color:var(--muted);font-weight:700;white-space:nowrap;}
.pillar .goal.done{color:var(--brand);}
.pillar .tip{font-size:.8rem;color:var(--muted);margin:.2rem 0 .5rem;}
.bar{height:7px;background:var(--track);border-radius:4px;overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:4px;transition:width .35s;}
.counter{display:flex;align-items:center;gap:.8rem;margin-top:.55rem;}
.counter button{width:42px;height:42px;border-radius:50%;border:none;font-size:1.4rem;
  font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.counter .v{font-size:1.3rem;font-weight:800;min-width:2.2rem;text-align:center;}
.counter .minus{background:var(--track);color:var(--text2);}
.toggle-btn{margin-top:.55rem;width:100%;padding:.6rem;border-radius:12px;border:2px solid var(--border);
  background:var(--surface2);color:var(--muted);font-size:1rem;font-weight:700;cursor:pointer;}
.toggle-btn.on{border-color:transparent;color:#fff;}

/* rainbow */
.arc{display:flex;gap:5px;justify-content:center;margin:.2rem 0 .7rem;}
.seg{flex:1;height:18px;border-radius:10px;background:var(--track);transition:.25s;}
.cnt{font-size:2rem;font-weight:800;color:var(--brand-d);}
.cnt small{font-size:1rem;font-weight:700;color:var(--muted);}
.msg{font-size:.95rem;color:var(--brand);font-weight:700;min-height:1.3rem;margin-top:.2rem;}
.sub{font-size:.8rem;color:var(--muted);}
.food{display:flex;align-items:center;gap:.7rem;background:var(--surface);border:2px solid var(--border);
  border-radius:16px;padding:.7rem .8rem;margin:.5rem 0;cursor:pointer;transition:.15s;}
.food .dot{width:28px;height:28px;border-radius:50%;flex:0 0 auto;border:2px solid rgba(0,0,0,.06);}
.food .b{flex:1;min-width:0;}
.food .nm{font-size:1.05rem;font-weight:800;}
.food .ef{font-size:.82rem;color:var(--muted);font-weight:600;}
.food .nut{font-size:.76rem;color:var(--muted);margin-top:1px;}
.food .more{font-size:.76rem;color:var(--brand-l);font-weight:700;margin-top:3px;display:inline-block;}
.food .detail{display:none;font-size:.8rem;color:var(--text2);padding-top:4px;}
.food .detail.show{display:block;}
.food .detail b{color:var(--brand-d);}
.food .detail .dgrp{margin-top:.4rem;}
.food .detail .dgrp b{display:block;font-size:.8rem;color:var(--brand-d);margin-bottom:.3rem;}
.food .detail .fd{display:flex;flex-wrap:wrap;gap:.4rem;}
.food .fchip.on{background:var(--cc);border-color:var(--cc);color:#fff;}
.food.pearl .fchip.on{background:radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2);border-color:#d2ccbd;color:#6b6452;}
.food.pearl.on .mk{background:radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2);border-color:#d2ccbd;color:#6b6452;}
@keyframes celebPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}60%{transform:translate(-50%,-50%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes burstRing{0%{opacity:0.9;transform:translate(-50%,-50%) scale(0.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}
@keyframes confettiShoot{0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) rotate(0deg) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) translate(var(--tx),calc(var(--ty) + 120px)) rotate(720deg) scale(0.3)}}
.food .mk{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--track);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--track);font-weight:900;}
.food.on{border-color:var(--cc);background:var(--ccbg);}
.food.on .mk{border-color:var(--cc);background:var(--cc);color:#fff;}
.sf{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:.7rem .8rem;margin:.5rem 0;}
.sf .top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.sf .cat{font-size:1rem;font-weight:800;color:var(--brand-d);}
.sf .fd{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.fchip{border:2px solid var(--border);background:var(--surface);color:var(--text2);border-radius:999px;padding:.34rem .72rem;font-size:.88rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s;}
.fchip.on{background:var(--brand);border-color:var(--brand);color:#fff;}
.sfreset{margin-top:.55rem;border:none;background:none;color:var(--muted);font-size:.8rem;font-weight:700;cursor:pointer;padding:2px 0;}
.sf .ef{font-size:.78rem;color:var(--muted);margin-top:2px;}
.chk{flex:0 0 auto;border:2px solid var(--border);color:var(--muted);background:var(--surface);
  border-radius:999px;padding:.35rem .7rem;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.chk.on{background:var(--brand);border-color:var(--brand);color:#fff;}

/* settings */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row .l{font-size:1rem;font-weight:700;}
.set-row .d{font-size:.78rem;color:var(--muted);margin-top:2px;}
.seg-ctrl{display:flex;background:var(--surface2);border-radius:12px;padding:3px;gap:3px;}
.seg-ctrl button{border:none;background:none;padding:.4rem .7rem;border-radius:10px;font-size:.9rem;
  font-weight:700;color:var(--muted);cursor:pointer;}
.seg-ctrl button.on{background:var(--brand);color:#fff;}
.switch{width:52px;height:30px;border-radius:16px;background:var(--track);border:none;position:relative;cursor:pointer;transition:.2s;}
.switch.on{background:var(--brand);}

      +'<div style="font-size:.92rem;line-height:1.9;text-align:center;opacity:.92;max-width:340px">吸氣 4 秒 → 屏息 7 秒 → 吐氣 8 秒<br>跟著圓圈一起呼吸<br><br>💛 可以結合禱告<br>吸氣時默念「主耶穌啊」<br>屏息時靜默焦點在耶穌<br>呼氣時默禱「感謝主！讚美主！」<br><br>「耶和華神…將生氣吹在他鼻孔裡，他就成了有靈的活人。」創世記 2:7</div>'

window._brClose=function(){ if(_brTimer){clearTimeout(_brTimer);_brTimer=null;} var ov=document.getElementById('breath-overlay'); if(ov)ov.remove(); };
window._brStart=function(){ var b=document.getElementById('br-start'); if(b)b.style.display='none'; _brCycle=0; _brRun('inhale'); };
function _brRun(phase){
  var circle=document.getElementById('br-circle'),ph=document.getElementById('br-phase'),cnt=document.getElementById('br-count');
  if(!circle)return;
  if(phase==='inhale'){
    _brCycle++; if(cnt)cnt.textContent='第 '+_brCycle+' / '+_brGoal+' 次';
    circle.style.transition='transform 4s ease-in-out'; circle.style.transform='scale(1.18)';
    if(ph)ph.textContent='吸氣 4 秒';
    _brTimer=setTimeout(function(){_brRun('hold');},4000);
  } else if(phase==='hold'){
    if(ph)ph.textContent='屏息 7 秒';
    _brTimer=setTimeout(function(){_brRun('exhale');},7000);
  } else {
    circle.style.transition='transform 8s ease-in-out'; circle.style.transform='scale(0.7)';
    if(ph)ph.textContent='吐氣 8 秒';
    _brTimer=setTimeout(function(){ if(_brCycle>=_brGoal){_brFinish();} else {_brRun('inhale');} },8000);
  }
}
function _brFinish(){
  var dd=today(),p=null; PILLARS.forEach(function(x){if(x.k==='a')p=x;}); dd['a']=goalOf(p); save();
  var ph=document.getElementById('br-phase'); if(ph)ph.textContent='完成 🙏';
  var cnt=document.getElementById('br-count'); if(cnt)cnt.textContent='已完成 '+_brGoal+' 次深呼吸，平安臨到！';
  var b=document.getElementById('br-start'); if(b){ b.style.display=''; b.textContent='✓ 完成，返回'; b.setAttribute('onclick','window._brCloseDone()'); }
}
window._brCloseDone=function(){ window._brClose(); renderHome(); toast('🌬️ 深呼吸 '+_brGoal+' 次完成，身心舒暢！'); };

    +'</div>'
    +'<div style=\"flex:1;overflow-y:auto;padding:14px 14px calc(20px + env(safe-area-inset-bottom))\">'
      +'<div style=\"background:linear-gradient(160deg,#5e35b1,#7b1fa2);border-radius:16px;padding:18px 16px;color:#fff;box-shadow:0 6px 20px rgba(94,53,177,0.35)\">'

/* ===================== 自訂飲食 / 營養品 / 藥物 清單與提醒 ===================== */
var INK_TYPES={food:{lbl:'食物',ic:'🍎',c:'#2e7d32'},supp:{lbl:'營養品',ic:'🌿',c:'#00897b'},med:{lbl:'藥物',ic:'💊',c:'#c62828'}};
function _inkItems(){ if(!S.intakeItems)S.intakeItems=[]; return S.intakeItems; }
function _inkLog(){ var k=todayKey(); if(!S.intakeLog)S.intakeLog={}; if(!S.intakeLog[k])S.intakeLog[k]={}; return S.intakeLog[k]; }
function _inkTimingLabel(it){ if(it.timing==='custom')return '⏰ '+(it.time||'--:--'); if(it.timing==='wake')return '🌅 起床後'; if(it.timing==='bed')return '🌙 睡前'; return it.timing==='before'?'🍽️ 飯前':'🍽️ 飯後'; }
function _inkSortKey(it){ if(it.timing==='wake')return '0_wake'; if(it.timing==='custom')return '1_'+(it.time||'99:99'); if(it.timing==='before')return '2_before'; if(it.timing==='after')return '3_after'; if(it.timing==='bed')return '4_bed'; return '3_after'; }
function _inkNowHM(){ var d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function _inkDue(it){ if(it.timing!=='custom'||!it.time)return false; if(_inkLog()[it.id])return false; return _inkNowHM()>=it.time; }

window._inkFormToggle=function(){ var f=document.getElementById('ink-form'); if(!f)return; var show=(f.style.display==='none'||!f.style.display); f.style.display=show?'block':'none'; if(show){var n=document.getElementById('ink-name'); if(n)try{n.focus();}catch(e){}} };
window._inkTimingChange=function(){ var s=document.getElementById('ink-timing'),t=document.getElementById('ink-time'); if(s&&t)t.style.display=(s.value==='custom')?'inline-block':'none'; };
window._inkAdd=function(){
  var n=document.getElementById('ink-name'),ty=document.getElementById('ink-type'),tm=document.getElementById('ink-timing'),ti=document.getElementById('ink-time'),no=document.getElementById('ink-note');
  var name=n?(n.value||'').trim():''; if(!name){ if(n)try{n.focus();}catch(e){} toast('請先輸入名稱'); return; }
  var timing=tm?tm.value:'before';
  _inkItems().push({id:'ink'+Date.now().toString(36)+Math.floor(Math.random()*1e4),name:name,type:ty?ty.value:'food',timing:timing,time:(timing==='custom'&&ti)?ti.value:'',note:no?(no.value||'').trim():'',created:Date.now()});
  save(); toast('✓ 已加入「'+name+'」'); renderFood();
};
window._inkToggle=function(id){ var log=_inkLog(); if(log[id])delete log[id]; else log[id]=Date.now(); save(); renderFood(); };
window._inkDelete=function(id){ var arr=_inkItems(),it=null,i; for(i=0;i<arr.length;i++){if(arr[i].id===id){it=arr[i];break;}} if(!it)return; _confirmDialog('🗑️ 刪除項目','確定刪除「'+it.name+'」？此項目將被移除。',function(){ S.intakeItems=_inkItems().filter(function(x){return x.id!==id;}); save(); renderFood(); }); };

function renderIntakeSection(view){
  var dk=window.__isDark();
  var items=_inkItems().slice().sort(function(a,b){var ka=_inkSortKey(a),kb=_inkSortKey(b);return ka<kb?-1:(ka>kb?1:a.created-b.created);});

  view.appendChild(el('div','lead','自訂每天要吃的食物、營養品與藥物，設定飯前／飯後／時間，每天打勾記錄。'+(items.length?'　今日已完成 '+done+' / '+items.length:'')));

  var ctrl=el('div'); ctrl.style.cssText='margin:.2rem 2px .4rem';
  ctrl.innerHTML='<button onclick="window._inkFormToggle()" style="width:100%;padding:12px;border-radius:12px;border:1.5px dashed var(--brand);background:transparent;color:var(--brand-d);font-weight:800;font-size:1rem;cursor:pointer">＋ 新增項目</button>';
  view.appendChild(ctrl);

  var inpBg=dk?'rgba(255,255,255,0.06)':'#f8fdf8',inpCol=dk?'#e8f5e9':'#1b1b1b',bd=dk?'rgba(255,255,255,0.16)':'rgba(0,0,0,0.12)';
  var ist='padding:10px;border-radius:10px;border:1px solid '+bd+';font-size:1rem;background:'+inpBg+';color:'+inpCol+';font-family:inherit';
  var form=el('div','card'); form.id='ink-form'; form.style.display='none';
  form.innerHTML=
    '<input id="ink-name" placeholder="名稱（例：維生素C、降血壓藥、紅蘿蔔）" style="width:100%;box-sizing:border-box;'+ist+';margin-bottom:10px">'
    +'<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><label style="font-size:.92rem;color:var(--muted);min-width:38px">類型</label>'
      +'<select id="ink-type" style="flex:1;'+ist+'"><option value="food">🍎 食物</option><option value="supp">🌿 營養品</option><option value="med">💊 藥物</option></select></div>'
    +'<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px"><label style="font-size:.92rem;color:var(--muted);min-width:38px">時機</label>'
      +'<select id="ink-timing" onchange="window._inkTimingChange()" style="flex:1;min-width:130px;'+ist+'"><option value="wake">🌅 起床後</option><option value="before">🍽️ 飯前</option><option value="after">🍽️ 飯後</option><option value="bed">🌙 睡前</option><option value="custom">⏰ 自訂時間</option></select>'
      +'<input type="time" id="ink-time" value="08:00" style="display:none;'+ist+'"></div>'
    +'<input id="ink-note" placeholder="劑量／備註（選填，例：1顆、飯後30分）" style="width:100%;box-sizing:border-box;'+ist+';margin-bottom:12px">'
    +'<div style="display:flex;gap:10px"><button onclick="window._inkAdd()" style="flex:1;padding:12px;border-radius:12px;border:none;background:var(--brand);color:#fff;font-weight:800;font-size:1rem;cursor:pointer">新增</button>'
      +'<button onclick="window._inkFormToggle()" style="padding:12px 18px;border-radius:12px;border:1px solid '+bd+';background:transparent;color:var(--muted);font-size:1rem;cursor:pointer">取消</button></div>';
  view.appendChild(form);

  if(!items.length){
    var empty=el('div','card'); empty.style.cssText='text-align:center;color:var(--muted);font-size:.9rem';
    empty.innerHTML='還沒有自訂項目。點上方「＋ 新增項目」，把每天要吃的食物、營養品或藥物加進來吧 🌱';
    view.appendChild(empty);
  } else {
    items.forEach(function(it){
      var tm=INK_TYPES[it.type]||INK_TYPES.food, on=!!log[it.id], due=_inkDue(it);
      var row=el('div','card');
      row.style.cssText='display:flex;align-items:center;gap:.7rem;padding:.8rem .9rem;margin:.5rem 0;border:2px solid '+(on?'var(--brand)':(due?'#c62828':'var(--border)'))+';'+(on?('background:'+(dk?'rgba(76,175,80,0.12)':'#f1f8f2')):'');
      var dueBadge=due?'<span style="margin-left:6px;font-size:.72rem;font-weight:800;color:#fff;background:#c62828;border-radius:8px;padding:1px 7px">該服用了</span>':'';
      var note=it.note?'<div style="font-size:.8rem;color:var(--muted);margin-top:2px">'+esc(it.note)+'</div>':'';
      row.innerHTML='<div style="font-size:26px;line-height:1;flex:0 0 auto">'+tm.ic+'</div>'

        +'<div onclick="window._inkToggle(\''+it.id+'\')" role="button" aria-label="打卡" style="flex:0 0 auto;width:38px;height:38px;border-radius:50%;border:2px solid '+(on?'var(--brand)':'var(--track)')+';background:'+(on?'var(--brand)':'transparent')+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;font-weight:800;cursor:pointer">'+(on?'✓':'')+'</div>';
      view.appendChild(row);
    });
  }
}

function renderFood(){
  var view=document.getElementById('view'); view.innerHTML='';
  document.getElementById('secLabel').textContent='\ud83c\udf08 \u5f69\u8679\u98f2\u98df';
  renderIntakeSection(view);
  var rk=todayKey(); var eaten=S.rainbow[rk]||[];
  var sk=weekKey(); var sw=S.superWeek[sk];
  if(!sw||Array.isArray(sw)){sw={c:{},f:{}};}
  if(!sw.c)sw.c={}; if(!sw.f)sw.f={};

  var hero=el('div','card');
  hero.style.textAlign='center';
  var arc='<div class="arc">'; RAINBOW.forEach(function(c){
    var pearl=(c.key==='白');
    var fill = eaten.indexOf(c.key)>=0
      ? (pearl?'radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2)':c.color)
      : 'var(--track)';
    var bd = (pearl && eaten.indexOf(c.key)>=0) ? ';box-shadow:inset 0 0 0 1.5px #d2ccbd' : '';
    arc+='<div class="seg" data-k="'+c.key+'" style="background:'+fill+bd+'"></div>';});
  arc+='</div>';
  var core=CORE.filter(function(k){return eaten.indexOf(k)>=0;}).length;
  var msg = eaten.length===0?'今天先從一種顏色開始吧 🌱':(core>=5?'五彩俱全！數算神豐富的恩典 🎉':(core>=3?'很棒，快湊齊核心五色了！':'好的開始，再多加幾種顏色！'));
  hero.innerHTML='<div class="sub" style="margin-bottom:4px">每天五彩俱全，多樣、均衡、適量，數算神豐富的恩典。</div>'+arc+
    '<div class="cnt">'+eaten.length+'<small> / 7 色</small></div>'+
    '<div class="msg">'+msg+'</div>'+
    '<div class="sub">核心五色：紅 · 橙 · 黃 · 綠 · 藍紫（白、黑是潤肺補腎的隱形功臣）</div>';
  view.appendChild(hero);

  view.appendChild(el('h2','title','今天吃到哪些顏色？'));
  view.appendChild(el('div','lead','點顏色卡片打卡；展開「食材」可逐項點選吃過。'));
  RAINBOW.forEach(function(c){
    var on=eaten.indexOf(c.key)>=0;
    var fe=(S.rainbowFoods[rk]||{})[c.key]||[];
    var card=el('div','food'+(on?' on':'')+(c.key==='白'?' pearl':''));
    card.style.setProperty('--cc',c.color); card.style.setProperty('--ccbg', window.__isDark()?'rgba(255,255,255,0.06)':c.bg);
    var dotStyle = c.key==='白'
      ? 'background:radial-gradient(circle at 35% 30%,#fff,#f3efe6 65%,#e6e0d2);border:2px solid #d2ccbd'
      : 'background:'+c.color;
    function chip(label,id){return '<span class="fchip'+(fe.indexOf(id)>=0?' on':'')+'" data-fn="'+esc(id)+'">'+label+'</span>';}
    function chips(str,grp){return str.split('、').map(function(fn){return chip(fn,fn);}).join('')+chip('其它','其它·'+grp);}
    card.innerHTML='<div class="dot" style="'+dotStyle+'"></div>'+
      '<div class="b"><div class="nm">'+c.name+' <span class="ef">'+c.ef+'</span></div>'+
      '<div class="nut">'+c.nut+'</div><div class="more">食材 ▾</div>'+
      '<div class="detail"><div class="dgrp"><b>蔬菜</b><div class="fd">'+chips(c.veg,'蔬菜')+'</div></div>'+
      '<div class="dgrp"><b>水果</b><div class="fd">'+chips(c.fruit,'水果')+'</div></div></div></div>'+
      '<div class="mk">'+(on?'✓':'')+'</div>';
    card.querySelector('.more').addEventListener('click',function(e){
      e.stopPropagation();var det=card.querySelector('.detail');det.classList.toggle('show');
      this.textContent=det.classList.contains('show')?'收起 ▴':'食材 ▾';});
    card.querySelectorAll('.fchip').forEach(function(ch){
      ch.addEventListener('click',function(e){
        e.stopPropagation();
        var fn=ch.getAttribute('data-fn');
        if(!S.rainbowFoods[rk])S.rainbowFoods[rk]={};
        var a=S.rainbowFoods[rk][c.key]||[]; var p=a.indexOf(fn);
        if(p>=0){a.splice(p,1);ch.classList.remove('on');}else{a.push(fn);ch.classList.add('on');}
        S.rainbowFoods[rk][c.key]=a; save();});
    });
    card.addEventListener('click',function(){
      var arr=S.rainbow[rk]||[];var i=arr.indexOf(c.key);
      if(i>=0)arr.splice(i,1);else arr.push(c.key);
      S.rainbow[rk]=arr;save();renderFood();});
    view.appendChild(card);
  });

  view.appendChild(el('h2','title','超級食物'));
  var sfTried=0; SUPER.forEach(function(s,i){ if((sw.c[i]||0)>0||((sw.f[i]||[]).length>0)) sfTried++; });
  view.appendChild(el('div','lead','營養密度高，搭配七彩蔬果最穩妥。點食材記錄吃過、按「本週吃過」計次。本週已碰：'+sfTried+' / 7 類'));

/* ===================== 量測頁 ===================== */
function bpCat(sys,dia){
  if(sys>=180||dia>=120) return {l:'高血壓危象',c:'#b71c1c'};
  if(sys>=140||dia>=90)  return {l:'第二期高血壓',c:'#e53935'};
  if(sys>=130||dia>=80)  return {l:'第一期高血壓',c:'#fb8c00'};
  if(sys>=120&&dia<80)   return {l:'血壓升高',c:'#f9a825'};
  return {l:'正常',c:'#43a047'};
}
function mdate(t){var d=new Date(t);return (d.getMonth()+1)+'/'+d.getDate();}
function spark(vals,color){
  if(!vals||vals.length<2)return '';
  var w=320,h=72,pad=10,n=vals.length;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals); if(mx===mn)mx=mn+1;
  var xy=vals.map(function(v,i){var x=pad+(w-2*pad)*(n>1?i/(n-1):0);var y=pad+(h-2*pad)*(1-(v-mn)/(mx-mn));return [x,y];});
  var pts=xy.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var dots=xy.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.6" fill="'+color+'"/>';}).join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;margin:.5rem 0"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg>';
}
function renderMeasure(){
  var view=document.getElementById('view'); view.innerHTML='';
  document.getElementById('secLabel').textContent='📊 健康量測 MEASURE';
  if(!S.measure)S.measure={w:[],bp:[]};
  var W=S.measure.w, BP=S.measure.bp;

  view.appendChild(el('h2','title','體重 ⚖️'));
  var wc=el('div','card'); var last=W[W.length-1]; var head='';
  if(last){
    var prev=W[W.length-2]; var delta=prev?(last.kg-prev.kg):0;
    var dtxt=prev?((delta>0?'▲ +'+delta.toFixed(1):(delta<0?'▼ '+delta.toFixed(1):'＝ 0'))+' kg'):'首次紀錄';
    var dcol=delta>0?'#e53935':(delta<0?'#43a047':'var(--muted)');
    head='<div class="mbig">'+last.kg.toFixed(1)+'<small> kg</small></div><div class="msub" style="color:'+dcol+'">'+dtxt+'<span style="color:var(--muted)"> · '+mdate(last.t)+'</span></div>';
  }else{ head='<div class="msub">尚未記錄，輸入今天的體重開始吧。</div>'; }
  wc.innerHTML=head+spark(W.slice(-14).map(function(r){return r.kg;}),'#43a047')+
    '<div class="mrow"><input class="minput" id="w-kg" type="number" inputmode="decimal" step="0.1" placeholder="體重 (kg)"/><button class="mbtn" id="w-add">記錄</button></div>';
  view.appendChild(wc);
  if(W.length){
    var wl=el('div','card'); wl.innerHTML='<div class="mlt">最近紀錄</div>';
    W.slice(-7).reverse().forEach(function(r){
      var row=el('div','mrec'); row.innerHTML='<span>'+mdate(r.t)+'</span><b>'+r.kg.toFixed(1)+' kg</b><button class="mdel">✕</button>';
      row.querySelector('.mdel').addEventListener('click',function(){var i=S.measure.w.indexOf(r);if(i>=0)S.measure.w.splice(i,1);save();renderMeasure();});
      wl.appendChild(row);
    });
    view.appendChild(wl);
  }
  document.getElementById('w-add').addEventListener('click',function(){
    var v=parseFloat(document.getElementById('w-kg').value);
    if(!(v>0&&v<400)){toast('請輸入有效體重');return;}
    S.measure.w.push({t:Date.now(),kg:v}); save(); renderMeasure(); toast('已記錄 ✓');
  });

  view.appendChild(el('h2','title','血壓 🩺'));
  var bc=el('div','card'); var lb=BP[BP.length-1]; var bhead='';
  if(lb){
    var cat=bpCat(lb.sys,lb.dia);
    bhead='<div class="mbig">'+lb.sys+'<small>/'+lb.dia+' mmHg</small></div><div class="msub">'+(lb.pulse?('脈搏 '+lb.pulse+' · '):'')+mdate(lb.t)+' <span class="bpcat" style="background:'+cat.c+'22;color:'+cat.c+'">'+cat.l+'</span></div>';
  }else{ bhead='<div class="msub">尚未記錄，輸入收縮壓 / 舒張壓開始。</div>'; }
  bc.innerHTML=bhead+
    '<div class="mrow"><input class="minput" id="bp-s" type="number" inputmode="numeric" placeholder="收縮壓"/><span class="msep">/</span><input class="minput" id="bp-d" type="number" inputmode="numeric" placeholder="舒張壓"/></div>'+
    '<div class="mrow"><input class="minput" id="bp-p" type="number" inputmode="numeric" placeholder="脈搏（選填）"/><button class="mbtn" id="bp-add">記錄</button></div>';
  view.appendChild(bc);
  if(BP.length){
    var bl=el('div','card'); bl.innerHTML='<div class="mlt">最近紀錄</div>';
    BP.slice(-7).reverse().forEach(function(r){
      var cat=bpCat(r.sys,r.dia); var row=el('div','mrec');
      row.innerHTML='<span>'+mdate(r.t)+'</span><b>'+r.sys+'/'+r.dia+'<small style="font-weight:600;color:var(--muted)"> mmHg'+(r.pulse?' · '+r.pulse:'')+'</small></b><span class="bpdot" style="background:'+cat.c+'"></span><button class="mdel">✕</button>';
      row.querySelector('.mdel').addEventListener('click',function(){var i=S.measure.bp.indexOf(r);if(i>=0)S.measure.bp.splice(i,1);save();renderMeasure();});
      bl.appendChild(row);
    });
    view.appendChild(bl);
  }
  document.getElementById('bp-add').addEventListener('click',function(){
    var s=parseInt(document.getElementById('bp-s').value,10);
    var dd=parseInt(document.getElementById('bp-d').value,10);
    var p=parseInt(document.getElementById('bp-p').value,10);
    if(!(s>0&&s<300)||!(dd>0&&dd<200)){toast('請輸入有效血壓');return;}
    var rec={t:Date.now(),sys:s,dia:dd}; if(p>0)rec.pulse=p;
    S.measure.bp.push(rec); save(); renderMeasure(); toast('已記錄 ✓');
  });

  view.appendChild(el('div','lead','量測值僅供個人記錄參考，診斷與用藥請諮詢醫師。'));
  view.appendChild(el('div','verse','「豈不知你們的身子就是聖靈的殿嗎？……所以，要在你們的身子上榮耀神。」（哥林多前書 6:19-20）'));
}

/* ===================== 斷食頁 ===================== */
var fastTick=null;
function pad2(n){return ('0'+Math.floor(n)).slice(-2);}
function fmtHM(ms){var s=Math.floor(ms/1000);var h=Math.floor(s/3600);var m=Math.floor((s%3600)/60);return h+'小時'+(m?m+'分':'');}
var FAST_GOALS=[{w:12,label:'12:12',desc:'入門',color:'#66BB6A'},{w:14,label:'14:10',desc:'進階',color:'#42A5F5'},{w:16,label:'16:8',desc:'推薦 ★',color:'#FFB74D'},{w:18,label:'18:6',desc:'強效',color:'#EF5350'}];

function renderFasting(){
  if(fastTick){clearInterval(fastTick);fastTick=null;}
  var view=document.getElementById('view'); view.innerHTML='';
  document.getElementById('secLabel').textContent='\uD83D\uDD4A\uFE0F 禁食斷食 FAST';
  if(!S.fast)S.fast={cur:null,log:[],goal:16};
  var f=S.fast; var active=!!f.cur; var W=f.goal;
  function fbox(c,k,v){return '<div class="fbox" style="border-color:'+c+'59;background:'+c+'1f"><div class="fbk">'+k+'</div><div class="fbv" style="color:'+c+'">'+v+'</div></div>';}

  /* 計畫選擇 */
  var gc=el('div','card'); gc.innerHTML='<div class="mlt" style="color:#00897b">\u23F0 選擇斷食計畫</div><div class="fgoals"></div>';
  var gw=gc.querySelector('.fgoals');
  FAST_GOALS.forEach(function(o){
    var on=f.goal===o.w; var bt=el('button','fgoal');
    if(on){bt.style.borderColor=o.color;bt.style.background=o.color+'24';bt.style.boxShadow='0 4px 14px '+o.color+'4d';}
    if(active){bt.disabled=true; if(!on)bt.style.opacity='.35';}
    bt.innerHTML='<div class="gl" style="color:'+o.color+'">'+o.label+'</div><div class="gd">斷'+o.w+'h</div><div class="gd">食'+(24-o.w)+'h</div><div class="gx" style="color:'+o.color+'">'+o.desc+'</div>';
    if(!active) bt.addEventListener('click',function(){S.fast.goal=o.w;save();renderFasting();});
    gw.appendChild(bt);
  });
  view.appendChild(gc);

  /* 計時環 */
  var ring=el('div','card'); ring.style.textAlign='center'; view.appendChild(ring);
  function paintRing(){
    var R=88,C=2*Math.PI*R,inner,boxes='';
    if(active){
      var elp=Date.now()-f.cur.start, goalMs=f.cur.goalH*3600000;
      var pct=Math.min(100,elp/goalMs*100), reached=elp>=goalMs, pc=reached?'#81C784':'#FFB74D';
      var eatArc='<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="rgba(129,199,132,0.15)" stroke-width="14" stroke-dasharray="'+(C*((24-f.cur.goalH)/24))+' '+C+'" stroke-dashoffset="'+(-C*(f.cur.goalH/24))+'"/>';

        +'<div class="mid"><div style="font-size:14px;color:var(--text2)">'+(reached?'\uD83C\uDF89 目標達成！':'\u23F3 斷食進行中')+'</div>'
        +'<div style="font-size:31px;font-weight:900;color:'+pc+';line-height:1.05;font-variant-numeric:tabular-nums;letter-spacing:-.5px">'+pad2(elp/3600000)+':'+pad2(elp%3600000/60000)+':'+pad2(elp%60000/1000)+'</div>'
        +'<div style="font-size:15px;color:var(--muted)">/ '+f.cur.goalH+'h 目標</div>'
        +'<div style="font-size:18px;font-weight:800;color:'+pc+'">'+pct.toFixed(1)+'%</div></div></div>';
      var st=new Date(f.cur.start), eat=new Date(f.cur.start+goalMs), stop=new Date(eat.getTime()+(24-f.cur.goalH)*3600000);
      boxes='<div class="fboxes">'+fbox('#FFB74D','\u23F9\uFE0F 斷食開始',pad2(st.getHours())+':'+pad2(st.getMinutes()))
        +fbox('#81C784','\uD83C\uDF7D\uFE0F 開始進食',pad2(eat.getHours())+':'+pad2(eat.getMinutes()))

      endBtn.textContent=miOn?'\u23F9 回填時間結束':(rn?'\u2705 完成斷食！':'\u23F9 結束斷食');

    ctl.querySelector('#f-ri').addEventListener('input',function(){

/* ===== 斷食提醒：音效 / 通知 / 震動 / 自動循環 ===== */
var _fac=null;
function fastUnlockAudio(){ try{ if(!_fac){var AC=window.AudioContext||window.webkitAudioContext; if(AC)_fac=new AC();} if(_fac&&_fac.state==='suspended')_fac.resume(); }catch(e){} }
function fastRequestNotify(){ try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){} }
function fastChime(kind){
  if(S.fast&&S.fast.sound===false) return;
  try{ fastUnlockAudio(); if(!_fac) return; var t0=_fac.currentTime, seq;
    if(kind==='cycle'){ seq=[[523.25,0],[659.25,.16],[783.99,.32],[1046.50,.50]]; }
    else { seq=[[784,0],[988,.16],[784,.50],[988,.66],[784,1.00],[988,1.16]]; }
    seq.forEach(function(n){ var o=_fac.createOscillator(),g=_fac.createGain(); o.type='sine'; o.frequency.value=n[0];
      var s=t0+n[1]; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.35,s+.02); g.gain.exponentialRampToValueAtTime(.0001,s+.42);
      o.connect(g); g.connect(_fac.destination); o.start(s); o.stop(s+.46); });
  }catch(e){}
}
function fastNotify(title,body){ try{ if('Notification' in window && Notification.permission==='granted'){ var n=new Notification(title,{body:body,tag:'fast321',renotify:true}); setTimeout(function(){try{n.close();}catch(e){}},9000);} }catch(e){} }
function fastAlert(kind,goalH){
  var title,short,color;
  if(kind==='goal'){ title='\uD83C\uDF89 斷食達標！'; short='已滿 '+goalH+'h，可以開始進食了'; color='#FF8F00'; }
  else if(kind==='cycle'){ title='\uD83D\uDD14 新一輪斷食開始'; short='上一輪已完成記錄，已自動換輪'; color='#388E3C'; }
  else { title='\u23F8\uFE0F 自動循環已暫停'; short='上一輪已記錄，請手動開始新一輪'; color='#546e7a'; }
  fastChime(kind==='goal'?'goal':'cycle');
  if(navigator.vibrate){ try{ navigator.vibrate(kind==='goal'?[300,150,300,150,300]:[200,100,200]); }catch(e){} }
  fastNotify(title, kind==='goal'?('已完成 '+goalH+' 小時斷食，可以開始進食了。願神的供應夠你用！'):kind==='cycle'?'上一輪斷食已完成並記錄，已自動開始新一輪。倚靠主，繼續得勝！':'上一輪斷食已記錄。因間隔較久，已暫停自動循環，請手動開始新一輪。');
  toast(title+'｜'+short, color);
}
function fastWatch(){
  var f=S.fast; if(!f||!f.cur) return;
  var now=Date.now(), goalMs=f.cur.goalH*3600000, cycleMs=86400000, elapsed=now-f.cur.start;
  if(elapsed>=goalMs && !f.cur.nGoal){ f.cur.nGoal=true; save(); fastAlert('goal', f.cur.goalH); }
  if(elapsed>=cycleMs){
    f.log.push({start:f.cur.start,end:f.cur.start+goalMs,goalH:f.cur.goalH,hours:f.cur.goalH,done:true});
    if(elapsed>=2*cycleMs){ f.cur=null; save(); fastAlert('stop'); }
    else { f.cur={start:f.cur.start+cycleMs,goalH:f.goal,nGoal:false,nCycle:false}; save(); fastAlert('cycle', f.goal); }
    if(window.__tab==='fast' && typeof renderFasting==='function') renderFasting();
  }
}

/* ══ Helpers ══ */
function today(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function allEmos(){return S_EMOTIONS_POS().concat(S_EMOTIONS_NEU()).concat(S_EMOTIONS_NEG());}
function S_EMOTIONS_POS(){return EMOTIONS.pos;}
function S_EMOTIONS_NEU(){return EMOTIONS.neu;}
function S_EMOTIONS_NEG(){return EMOTIONS.neg;}
function findEmo(k){
  return EMOTIONS.pos.concat(EMOTIONS.neu).concat(EMOTIONS.neg).find(function(e){return e.k===k;});
}
function isPos(k){return EMOTIONS.pos.some(function(e){return e.k===k;});}
function toast(msg,color){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:130px;left:50%;transform:translateX(-50%);'+
    'background:'+(color||'#4CAF50')+';color:#fff;padding:10px 18px;border-radius:12px;'+
    'font-size:16px;font-weight:700;z-index:9999;max-width:320px;text-align:center;'+
    'box-shadow:0 4px 16px rgba(0,0,0,0.25);pointer-events:none;';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2800);
}

    html += '<div class="t-bar" style="height:'+h+'%;background:'+bg+';"></div>';
  });
  html += '</div><div style="display:flex;justify-content:space-between;font-size:15px;color:#78909c;"><span>'+days[0].k.slice(5)+'</span><span>今天</span></div>';
  html += '<div style="display:flex;gap:10px;margin-top:5px;">';
  [['#66BB6A','正向'],['#FFB74D','混合'],['#EF9A9A','需轉化'],['#e0e0e0','未記錄']].forEach(function(c){
    html += '<div style="display:flex;align-items:center;gap:3px;font-size:15px;color:#546e7a;"><div style="width:10px;height:10px;border-radius:4px;background:'+c[0]+';"></div>'+c[1]+'</div>';
  });
  html += '</div></div>';
  return html;
}

function renderStrTrend(){
  if(S.strLog.length<2)return '';
  var days=buildDays14();
  var colors=['#e0e0e0','#4CAF50','#8BC34A','#FFC107','#FF7043','#EF5350'];
  var html='<div class="emo-card2"><div class="emo-sec" style="color:#546e7a;">📊 近14天壓力趨勢</div>';
  html += '<div class="trend-bars">';
  days.forEach(function(d){
    var recs=S.strLog.filter(function(r){return r.date===d.k;});
    var lv=recs.length>0?recs[recs.length-1].level:0;
    var h=lv>0?lv/5*80+16:12;
    html += '<div class="t-bar" style="height:'+h+'%;background:'+colors[lv]+';"></div>';
  });
  html += '</div><div style="display:flex;justify-content:space-between;font-size:15px;color:#78909c;"><span>'+days[0].k.slice(5)+'</span><span>今天</span></div></div>';
  return html;
}

function buildDays14(){
  var days=[];
  for(var i=13;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    days.push({k:k,recs:S.emoLog.filter(function(r){return r.date===k;})});
  }
  return days;
}

/* ══ Event Handlers ══ */
window._se = function(k){ S.emo=S.emo===k?null:k; S.root=null; S.posOpt=null; S.txStep=0; S.txDone=[]; render(); };
window._sr = function(k){ S.root=S.root===k?null:k; render(); };
window._spo= function(v){ S.posOpt=S.posOpt===v?null:v; render(); };
window._en = function(v){ S.emoNote=v; };
window._saveEmo = function(){
  if(!S.emo)return;
  var eo=findEmo(S.emo);
  var rootObj=ROOTS.find(function(r){return r.k===S.root;});
  S.emoLog.push({date:today(),time:new Date().toTimeString().slice(0,5),emoKey:S.emo,emoLabel:eo?eo.l:'',root:rootObj?rootObj.l:'',posOpt:S.posOpt||'',note:S.emoNote});
  sj(SEMO,S.emoLog);
  S.emo=null;S.root=null;S.posOpt=null;S.emoNote='';S.txStep=0;S.txDone=[];
  toast('✅ 情緒記錄完成！'+(eo?eo.e:'')+' 讓耶穌在這情緒中作王！','#7B1FA2');
  render();
};

/* 轉化步驟 - handled via data attribute delegation in afterRender */
window._txStart= function(){ S.txStep=1; render(); };
window._txNext = function(k){ if(S.txDone.indexOf(k)<0)S.txDone.push(k); S.txStep=Math.min(S.txStep+1,5); render(); };
window._pickFruit=function(f){ var i=S.txDone.indexOf(f); if(i>=0)S.txDone.splice(i,1); else S.txDone.push(f); render(); };
window._txDone=function(){
  S.txStep=6; S.txDone=['s1','s2','s3','s4','s5'];
  if(S.emo){
    var eo=findEmo(S.emo);
    var rootObj=ROOTS.find(function(r){return r.k===S.root;});
    S.emoLog.push({date:today(),time:new Date().toTimeString().slice(0,5),emoKey:S.emo,emoLabel:eo?eo.l:'',root:rootObj?rootObj.l:'',posOpt:S.posOpt||'',note:S.emoNote});
    sj(SEMO,S.emoLog);
  }
  toast('💝 情緒轉化完成！聖靈果子已結出，榮耀歸給耶穌！','#E91E63');
  S.emo=null; S.root=null; S.posOpt=null; S.txStep=0; S.txDone=[];
  render();
};

/* 壓力 */
window._ssl = function(v){ S.strLevel=S.strLevel===v?0:v; render(); };
window._sym = function(s){ var i=S.strSym.indexOf(s); if(i>=0)S.strSym.splice(i,1); else S.strSym.push(s); render(); };
window._tss = function(k){ var i=S.strSrc.indexOf(k);if(i>=0)S.strSrc.splice(i,1);else S.strSrc.push(k); render(); };
window._sn  = function(v){ S.strNote=v; };
window._saveStr=function(){
  if(!S.strLevel)return;
  var srcL=S.strSrc.map(function(k){var s=STR_SRC.find(function(x){return x.k===k;});return s?s.l:k;});
  S.strLog.push({date:today(),time:new Date().toTimeString().slice(0,5),level:S.strLevel,sources:srcL,note:S.strNote});
  sj(SSTR,S.strLog);
  S.strLevel=0;S.strSrc=[];S.strSym=[];S.strNote='';S.activeRelief=null;
  toast('🙏 壓力已交託神！「那超越人所能理解的神的平安，必保守你們的心懷意念。」','#2e7d32');
  render();
};

/* 工具 */
window._or=function(k){ if(k===null){S.activeRelief=null;}else{S.activeRelief=S.activeRelief===k?null:k; if(k==='breath'){S.breathPhase='idle';}} render(); setTimeout(function(){var c=document.querySelector('#emo-body2 .relief-card2.active');if(c&&c.scrollIntoView){c.scrollIntoView({behavior:'smooth',block:'center'});}},130); };

/* 深呼吸 */
function runBreathCycle(){
  S.breathPhase='inhale'; updateBreath();
  S.breathTimer=setTimeout(function(){
    S.breathPhase='hold'; updateBreath();
    S.breathTimer=setTimeout(function(){
      S.breathPhase='exhale'; updateBreath();
      S.breathTimer=setTimeout(function(){
        S.breathCount++;
        if(S.breathCount < 5){
          runBreathCycle(); // auto-continue next cycle
        } else {
          // Done 5 cycles
          S.breathPhase='idle'; S.breathCount=0;
          updateBreath();
          S.breathTimer=null;
          toast('🌬️ 5次深呼吸完成！願神的平安充滿你的心。','#4CAF50');
        }
      },8000);
    },7000);
  },4000);
}
window._sb=function(){
  // Click to start (idle) or stop (during any phase)
  if(S.breathTimer){
    clearTimeout(S.breathTimer); S.breathTimer=null;
    S.breathPhase='idle'; S.breathCount=0;
    updateBreath(); return;
  }
  if(S.breathPhase==='idle'){
    runBreathCycle();
  }
};
function updateBreath(){
  var c=document.getElementById('breath-circle2');
  if(!c){render();return;}
  var labels={idle:'點擊開始',inhale:'吸氣',hold:'憋住',exhale:'呼氣'};
  var secs={idle:'點擊圓圈開始',inhale:'4秒',hold:'7秒',exhale:'8秒'};
  c.className=S.breathPhase+'2';
  c.innerHTML='<div style="font-size:15px;font-weight:900;">'+labels[S.breathPhase]+'</div><div style="font-size:15px;opacity:0.85;">'+secs[S.breathPhase]+'</div>';
  var n=c.nextElementSibling;
  if(n)n.textContent=S.breathPhase==='idle'?'點擊開始 · 自動完成5次':'第 '+(S.breathCount+1)+' / 5 次';
}

/* ── afterRender ── */
function afterRender(){
  var en=document.getElementById('emo-note2'); if(en)en.value=S.emoNote;
  var sn=document.getElementById('str-note2'); if(sn)sn.value=S.strNote;
  // Event delegation - use document level for reliability
  /* inline onclick handles clicks */
}

/* ══ Open / Close ══ */
function openEmo(tab){
  S.emoLog=lj(SEMO,[]); S.strLog=lj(SSTR,[]);
  S.txStep=0; S.txDone=[]; S.emo=null; S.root=null; S.posOpt=null;
  buildOverlay();
  if(tab)S.tab=tab;
  /* sync tab buttons */
  setTimeout(function(){
    var te=document.getElementById('emo-tb-e');
    var ts=document.getElementById('emo-tb-s');
    if(!te||!ts)return;
    if(S.tab==='emotion'){
      te.style.cssText='background:rgba(255,143,0,0.15);color:#FF8F00;';
      ts.style.cssText='';
    }else{
      ts.style.cssText='background:rgba(239,83,80,0.15);color:#EF5350;';
      te.style.cssText='';
    }
    render();
  },50);
}
function closeEmo(){
  var o=document.getElementById('ns-emotion-overlay');
  if(o)o.classList.remove('open');
  document.body.style.overflow='';
  if(S.breathTimer){clearTimeout(S.breathTimer);S.breathTimer=null;}
}
window._closeEmotion=closeEmo;
window._openEmotionModule=openEmo;

function buildOverlay(){
  var old=document.getElementById('ns-emotion-overlay');if(old)old.remove();
  var view=document.getElementById('view'); if(!view)return;
  var sec=document.getElementById('secLabel'); if(sec)sec.textContent='💛 心靈平安 SOUL';
  view.innerHTML=
    '<div class="emo-tabs2" style="padding:4px 0 0">'
    +'<button class="emo-tab2 on" id="emo-tb-e" onclick="window._et(\'emotion\')" style="background:rgba(255,143,0,0.15);color:#FF8F00;">😊 情緒管理</button>'
    +'<button class="emo-tab2" id="emo-tb-s" onclick="window._et(\'stress\')">🌡️ 壓力管理</button>'
    +'</div>'
    +'<div class="emo-body2" id="emo-body2" style="padding:12px 0 90px"></div>';
}

window._et=function(tab){
  S.tab=tab;
  var te=document.getElementById('emo-tb-e'),ts=document.getElementById('emo-tb-s');
  if(!te||!ts)return;
  if(tab==='emotion'){te.classList.add('on');te.style.cssText='background:rgba(255,143,0,0.15);color:#FF8F00;';ts.classList.remove('on');ts.style.cssText='';}
  else{ts.classList.add('on');ts.style.cssText='background:rgba(239,83,80,0.15);color:#EF5350;';te.classList.remove('on');te.style.cssText='';}
  render();
};

/* ── Hook 情緒按鈕 ── */
function hookBtn(){
  var nav=document.getElementById('ns-bottom-nav');
  if(!nav){setTimeout(hookBtn,900);return;}
  nav.querySelectorAll('.bn-tab[data-tab="today_mood"]').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();openEmo('emotion');},true);
  });
}
/* ── 步驟按鈕：document 層級委派(對動態重建內容最可靠，取代不穩的內聯 onclick) ── */
document.addEventListener('click', function(e){
  var t = e.target;
  if (!t) return;
  if (t.nodeType === 3) t = t.parentElement;
  if (!t || !t.closest) return;
  t = t.closest('[data-txnext],[data-txstart],[data-txdone],[data-fruit]');
  if (!t) return;
  if (t.hasAttribute('data-txstart')) { window._txStart && window._txStart(); }
  else if (t.hasAttribute('data-txdone')) { window._txDone && window._txDone(); }
  else if (t.hasAttribute('data-fruit')) { window._pickFruit && window._pickFruit(t.getAttribute('data-fruit')); }
  else if (t.hasAttribute('data-txnext')) { window._txNext && window._txNext(t.getAttribute('data-txnext')); }
}, false);

/* hookBtn 自動掛載已移除：v17 由情緒分頁直接呼叫 _openEmotionModule */

})();



</script>
